    infisical_secret:
        subCategory: Secrets
        description: Create secrets & save to Infisical
        name: infisical_secret
        title: infisical_secret Resource - terraform-provider-infisical
        examples:
            - name: mongo_secret
              manifest: |-
                {
                  "env_slug": "dev",
                  "folder_path": "/",
                  "name": "MONGO_DB",
                  "value": "\u003csome-key\u003e",
                  "workspace_id": "PROJECT_ID"
                }
              dependencies:
                infisical_secret_tag.terraform: |-
                    {
                      "color": "#fff",
                      "name": "terraform",
                      "project_id": "PROJECT_ID",
                      "slug": "terraform"
                    }
            - name: smtp_secret
              manifest: |-
                {
                  "env_slug": "dev",
                  "folder_path": "/mail-service",
                  "name": "SMTP",
                  "secret_reminder": {
                    "note": "Rotate this secret using X API",
                    "repeat_days": 30
                  },
                  "value": "\u003csome key\u003e",
                  "workspace_id": "PROJECT_ID"
                }
              dependencies:
                infisical_secret_tag.terraform: |-
                    {
                      "color": "#fff",
                      "name": "terraform",
                      "project_id": "PROJECT_ID",
                      "slug": "terraform"
                    }
            - name: github_action_secret
              manifest: |-
                {
                  "env_slug": "dev",
                  "folder_path": "/",
                  "name": "GITHUB_ACTION",
                  "tag_ids": [
                    "${infisical_secret_tag.terraform.id}"
                  ],
                  "value": "\u003csome value\u003e",
                  "workspace_id": "PROJECT_ID"
                }
              references:
                tag_ids: infisical_secret_tag.terraform.id
              dependencies:
                infisical_secret_tag.terraform: |-
                    {
                      "color": "#fff",
                      "name": "terraform",
                      "project_id": "PROJECT_ID",
                      "slug": "terraform"
                    }
        argumentDocs:
            env_slug: (String) The environment slug of the secret to modify/create
            folder_path: (String) The path to the folder where the given secret resides
            id: (String) The ID of the secret
            last_updated: (String)
            metadata: (Map of String) Metadata associated with the secret as key-value pairs.
            name: (String) The name of the secret
            note: (String) Note for the secret rotation reminder
            repeat_days: (Number) Frequency of secret rotation reminder in days
            secret_reminder: (Attributes) (see below for nested schema)
            tag_ids: (List of String) Tag ids to be attached for the secrets.
            value: (String, Sensitive) The value of the secret in plain text. This is required if value_wo is not set.
            value_wo: (String) The value of the secret in plain text as a write-only secret. If set, the secret value will not be stored in state. This is required if value is not set. Requires Terraform version 1.11.0 or higher.
            value_wo_version: (Number) Used together with value_wo to trigger an update. Increment this value when an update to the value_wo is required.
            workspace_id: (String) The Infisical project ID (Required for Machine Identity auth, and service tokens with multiple scopes)
        importStatements: []
