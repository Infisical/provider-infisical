    infisical_cert_manager_ca_certificate:
        subCategory: Certificate Management
        description: Create and manage CA certificates in Infisical. Only Machine Identity authentication is supported for this resource.
        name: infisical_cert_manager_ca_certificate
        title: infisical_cert_manager_ca_certificate Resource - terraform-provider-infisical
        examples:
            - name: root_cert
              manifest: |-
                {
                  "ca_id": "${infisical_cert_manager_internal_ca.root.id}",
                  "max_path_length": 1,
                  "not_after": "2034-01-01T00:00:00Z",
                  "not_before": "2024-01-01T00:00:00Z"
                }
              references:
                ca_id: infisical_cert_manager_internal_ca.root.id
              dependencies:
                infisical_cert_manager_internal_ca.issuing: |-
                    {
                      "common_name": "Enterprise Issuing Certificate Authority",
                      "country": "US",
                      "key_algorithm": "RSA_2048",
                      "locality": "San Francisco",
                      "name": "enterprise-issuing-ca",
                      "organization": "Example Corp",
                      "ou": "IT Security",
                      "project_slug": "${infisical_project.pki.slug}",
                      "province": "California",
                      "type": "intermediate"
                    }
                infisical_cert_manager_internal_ca.root: |-
                    {
                      "common_name": "Enterprise Root Certificate Authority",
                      "country": "US",
                      "key_algorithm": "RSA_2048",
                      "locality": "San Francisco",
                      "name": "enterprise-root-ca",
                      "organization": "Example Corp",
                      "ou": "IT Security",
                      "project_slug": "${infisical_project.pki.slug}",
                      "province": "California",
                      "type": "root"
                    }
                infisical_project.pki: |-
                    {
                      "description": "Project for PKI certificate management",
                      "name": "PKI Project",
                      "slug": "pki-project",
                      "type": "cert-manager"
                    }
            - name: issuing_cert
              manifest: |-
                {
                  "ca_id": "${infisical_cert_manager_internal_ca.issuing.id}",
                  "depends_on": [
                    "${infisical_cert_manager_ca_certificate.root_cert}"
                  ],
                  "max_path_length": 0,
                  "not_after": "2029-01-01T00:00:00Z",
                  "not_before": "2024-01-01T00:00:00Z",
                  "parent_ca_id": "${infisical_cert_manager_internal_ca.root.id}"
                }
              references:
                ca_id: infisical_cert_manager_internal_ca.issuing.id
                parent_ca_id: infisical_cert_manager_internal_ca.root.id
              dependencies:
                infisical_cert_manager_internal_ca.issuing: |-
                    {
                      "common_name": "Enterprise Issuing Certificate Authority",
                      "country": "US",
                      "key_algorithm": "RSA_2048",
                      "locality": "San Francisco",
                      "name": "enterprise-issuing-ca",
                      "organization": "Example Corp",
                      "ou": "IT Security",
                      "project_slug": "${infisical_project.pki.slug}",
                      "province": "California",
                      "type": "intermediate"
                    }
                infisical_cert_manager_internal_ca.root: |-
                    {
                      "common_name": "Enterprise Root Certificate Authority",
                      "country": "US",
                      "key_algorithm": "RSA_2048",
                      "locality": "San Francisco",
                      "name": "enterprise-root-ca",
                      "organization": "Example Corp",
                      "ou": "IT Security",
                      "project_slug": "${infisical_project.pki.slug}",
                      "province": "California",
                      "type": "root"
                    }
                infisical_project.pki: |-
                    {
                      "description": "Project for PKI certificate management",
                      "name": "PKI Project",
                      "slug": "pki-project",
                      "type": "cert-manager"
                    }
            - name: dev_cert
              manifest: |-
                {
                  "ca_id": "${infisical_cert_manager_internal_ca.root.id}",
                  "max_path_length": -1,
                  "not_after": "2025-01-01T00:00:00Z",
                  "not_before": "2024-01-01T00:00:00Z"
                }
              references:
                ca_id: infisical_cert_manager_internal_ca.root.id
              dependencies:
                infisical_cert_manager_internal_ca.issuing: |-
                    {
                      "common_name": "Enterprise Issuing Certificate Authority",
                      "country": "US",
                      "key_algorithm": "RSA_2048",
                      "locality": "San Francisco",
                      "name": "enterprise-issuing-ca",
                      "organization": "Example Corp",
                      "ou": "IT Security",
                      "project_slug": "${infisical_project.pki.slug}",
                      "province": "California",
                      "type": "intermediate"
                    }
                infisical_cert_manager_internal_ca.root: |-
                    {
                      "common_name": "Enterprise Root Certificate Authority",
                      "country": "US",
                      "key_algorithm": "RSA_2048",
                      "locality": "San Francisco",
                      "name": "enterprise-root-ca",
                      "organization": "Example Corp",
                      "ou": "IT Security",
                      "project_slug": "${infisical_project.pki.slug}",
                      "province": "California",
                      "type": "root"
                    }
                infisical_project.pki: |-
                    {
                      "description": "Project for PKI certificate management",
                      "name": "PKI Project",
                      "slug": "pki-project",
                      "type": "cert-manager"
                    }
        argumentDocs:
            ca_id: (String) The ID of the certificate authority to generate a certificate for
            certificate: (String, Sensitive) The generated CA certificate in PEM format
            certificate_chain: (String, Sensitive) The certificate chain of the CA in PEM format
            id: (String) The unique identifier for this CA certificate resource
            max_path_length: (Number) The maximum number of intermediate CAs that may follow this CA in the certificate chain. Use -1 for no path limit
            not_after: (String) The date and time when the CA expires in RFC3339 format (e.g., '2034-01-01T00:00:00Z')
            not_before: (String) The date and time when the CA becomes valid in RFC3339 format (e.g., '2024-01-01T00:00:00Z')
            parent_ca_id: (String) The ID of the parent CA (required for intermediate CAs)
            serial_number: (String) The serial number of the CA certificate
        importStatements: []
    infisical_cert_manager_certificate:
        subCategory: Certificate Management
        description: Request and manage certificates from Infisical certificate profiles. Supports both CSR-based and direct field requests. The resource will poll until the certificate is issued or a timeout is reached. Only Machine Identity authentication is supported for this resource.
        name: infisical_cert_manager_certificate
        title: infisical_cert_manager_certificate Resource - terraform-provider-infisical
        examples:
            - name: my_cert
              manifest: |-
                {
                  "alt_names": [
                    "api.example.com",
                    "api-internal.example.com"
                  ],
                  "common_name": "api.example.com",
                  "country": "US",
                  "key_algorithm": "RSA_2048",
                  "organization": "Example Corp",
                  "profile_id": "\u003cinternal-ca-profile-id\u003e",
                  "signature_algorithm": "RSA-SHA256",
                  "timeout_seconds": 300,
                  "ttl": "90d"
                }
            - name: csr_based_cert
              manifest: |-
                {
                  "csr": "${file(\"./my-certificate.csr\")}",
                  "profile_id": "\u003cprofile-id\u003e",
                  "timeout_seconds": 300,
                  "ttl": "90d"
                }
            - name: inline_csr_cert
              manifest: |-
                {
                  "csr": "-----BEGIN CERTIFICATE REQUEST-----\nMIICljCCAX4CAQAwGDEWMBQGA1UEAwwNaW5maXNpY2FsLmNvbTCCASIwDQYJKoZI\nhvcNAQEBBQADggEPADCCAQoCggEBAL7c6thewe78xVXyBQ0ZgmSjlkYCGeJgxot/\nQqB1+z3mlMr/tViy8UFBThO69i532ZgWyuJ24YWVeF67WBQPYXnkXlUMJKYGM6UA\nka6dOjCeSJHNXkxbLHI3yljvXP/Kn6w+WczeSuJXYNH5Uet9TtTEuXIqTgWjnAhD\nTAWqtyHPbtw3jVWy7xkSc/JuqVGha05snjPPmF9lkdoztG3gosN0TnwTGaQ382sr\ngiUBkkfdBK0eGmTwJlG9xLZMm3hDyAFz2/iw6GR57uvp/h9RDZVZcuisUQf2T8NZ\nCCVPTSGpfYxbQ4KviDghL2/GDY9NVudHSyeCCA0zOPZW9tg7hAECAwEAAaA5MDcG\nCSqGSIb3DQEJDjEqMCgwJgYDVR0RBB8wHYINaW5maXNpY2FsLmNvbYIMaW5maXNp\nY2FsLmVzMA0GCSqGSIb3DQEBCwUAA4IBAQBZy+AYPWeZVs+ZPP/9Zj0cl7BchwZV\nphEPIezIdKqDyLcyjCf168rbTEqch9gz5CvyIPL3kBohicI/k+/RYPnRKsTdiYNE\nXrpeaarHqlvpGzjsrQUv6iJgrDGZXMVJn+op3cDChNPet9RJ1utH96S6W6Ent4QU\n90XNi6fBSja8wThfj0AAl51OycHwfNg5/CtygT0eM16/bZl0knJ884Bf35LNE731\nAwp8H6ELyXOX1tRKNZRPMKr2Nw/qn6QK611R9aSA+maa25YZa8K0cvSVAJQOfdei\n0A7YVKj492nqnN/xS5kzIidZuaCBLocLo5j615xh/79YgMZjrGo3wvnk\n-----END CERTIFICATE REQUEST-----\n",
                  "profile_id": "\u003cprofile-id\u003e",
                  "timeout_seconds": 300,
                  "ttl": "90d"
                }
        argumentDocs:
            alt_names: (List of String) Subject alternative names (SANs) for the certificate
            certificate: (String) The issued certificate in PEM format
            certificate_chain: (String) The certificate chain in PEM format
            certificate_request_id: (String) The ID of the certificate request
            common_name: (String) The common name (CN) for the certificate. Required when not using CSR
            country: (String) The country (C) for the certificate (2-letter code)
            csr: (String) Certificate Signing Request (CSR) in PEM format. If provided, the certificate will be issued based on the CSR. Use Terraform's file() function to read from a file (e.g., file("./my-certificate.csr"))
            extended_key_usages: '(List of String) Extended key usages for the certificate. Supported: client_auth, server_auth, code_signing, email_protection, ocsp_signing, time_stamping'
            id: (String) The ID of the certificate
            key_algorithm: '(String) The key algorithm for the certificate. Supported: RSA_2048, RSA_3072, RSA_4096, ECDSA_P256, ECDSA_P384, ECDSA_P521'
            key_usages: '(List of String) Key usages for the certificate. Supported: digital_signature, key_encipherment, non_repudiation, data_encipherment, key_agreement, key_cert_sign, crl_sign, encipher_only, decipher_only'
            locality: (String) The locality (L) for the certificate
            not_after: (String) The not-after (expiration) date of the certificate (RFC3339 format)
            not_before: (String) The not-before date of the certificate (RFC3339 format)
            organization: (String) The organization (O) for the certificate
            ou: (String) The organizational unit (OU) for the certificate
            private_key: (String, Sensitive) The private key in PEM format (only available for direct field requests, not CSR-based)
            profile_id: (String) The ID of the certificate profile to use for issuance
            province: (String) The state/province (ST) for the certificate
            serial_number: (String) The serial number of the issued certificate
            signature_algorithm: '(String) The signature algorithm for the certificate. Supported: RSA-SHA256, RSA-SHA384, RSA-SHA512, ECDSA-SHA256, ECDSA-SHA384, ECDSA-SHA512'
            status: (String) The status of the certificate (pending, issued, failed)
            timeout_seconds: (Number) Maximum time to wait for certificate issuance in seconds. Defaults to 3600 (1 hour)
            ttl: (String) Time to live for the certificate (e.g., '30d', '90d', '1y')
        importStatements: []
    infisical_cert_manager_certificate_policy:
        subCategory: Certificate Management
        description: Create and manage certificate policies in Infisical. Only Machine Identity authentication is supported for this resource.
        name: infisical_cert_manager_certificate_policy
        title: infisical_cert_manager_certificate_policy Resource - terraform-provider-infisical
        examples:
            - name: web_server
              manifest: |-
                {
                  "algorithms": [
                    {
                      "key_algorithm": [
                        "RSA-2048",
                        "RSA-3072",
                        "ECDSA-P256",
                        "ECDSA-P384"
                      ],
                      "signature": [
                        "SHA256-RSA",
                        "SHA256-ECDSA",
                        "SHA384-ECDSA"
                      ]
                    }
                  ],
                  "description": "Policy for web server certificates",
                  "extended_key_usages": [
                    {
                      "allowed": [
                        "server_auth",
                        "client_auth"
                      ]
                    }
                  ],
                  "key_usages": [
                    {
                      "allowed": [
                        "digital_signature",
                        "key_encipherment"
                      ]
                    }
                  ],
                  "name": "web-server-policy",
                  "project_slug": "${infisical_project.pki.slug}",
                  "sans": [
                    {
                      "allowed": [
                        "*.example.com",
                        "*.internal.example.com"
                      ],
                      "required": [
                        "*.example.com"
                      ],
                      "type": "dns_name"
                    },
                    {
                      "allowed": [
                        "*@example.com"
                      ],
                      "type": "email"
                    },
                    {
                      "allowed": [
                        "10.0.0.0/8",
                        "192.168.0.0/16"
                      ],
                      "type": "ip_address"
                    }
                  ],
                  "subject": [
                    {
                      "allowed": [
                        "*.example.com",
                        "*.internal.example.com"
                      ],
                      "required": [
                        "*.example.com"
                      ],
                      "type": "common_name"
                    },
                    {
                      "required": [
                        "Example Corp"
                      ],
                      "type": "organization"
                    },
                    {
                      "required": [
                        "US"
                      ],
                      "type": "country"
                    }
                  ],
                  "validity": [
                    {
                      "max": "90d"
                    }
                  ]
                }
              references:
                project_slug: infisical_project.pki.slug
              dependencies:
                infisical_project.pki: |-
                    {
                      "description": "Project for PKI certificate management",
                      "name": "PKI Project",
                      "slug": "pki-project",
                      "type": "cert-manager"
                    }
            - name: code_signing
              manifest: |-
                {
                  "algorithms": [
                    {
                      "key_algorithm": [
                        "RSA-2048",
                        "RSA-3072",
                        "ECDSA-P256"
                      ],
                      "signature": [
                        "SHA256-RSA",
                        "SHA256-ECDSA"
                      ]
                    }
                  ],
                  "description": "Policy for code signing certificates",
                  "extended_key_usages": [
                    {
                      "allowed": [
                        "code_signing"
                      ]
                    }
                  ],
                  "key_usages": [
                    {
                      "allowed": [
                        "digital_signature"
