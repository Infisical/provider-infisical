                  "name": "enterprise-root-ca",
                  "organization": "Acme Corp",
                  "ou": "IT Security",
                  "project_slug": "${infisical_project.pki.slug}",
                  "province": "California",
                  "type": "root"
                }
              references:
                project_slug: infisical_project.pki.slug
              dependencies:
                infisical_project.pki: |-
                    {
                      "description": "Project for managing SSL/TLS certificates",
                      "name": "PKI Project",
                      "slug": "pki-project",
                      "type": "cert-manager"
                    }
            - name: issuing
              manifest: |-
                {
                  "common_name": "Enterprise Issuing Certificate Authority",
                  "country": "US",
                  "key_algorithm": "RSA_2048",
                  "locality": "San Francisco",
                  "name": "enterprise-issuing-ca",
                  "organization": "Acme Corp",
                  "ou": "IT Security",
                  "project_slug": "${infisical_project.pki.slug}",
                  "province": "California",
                  "type": "intermediate"
                }
              references:
                project_slug: infisical_project.pki.slug
              dependencies:
                infisical_project.pki: |-
                    {
